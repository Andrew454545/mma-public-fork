name: Bug report
description: Something doesn't work right
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 0.4.2
  - type: textarea
    id: log
    attributes:
      label: Log file (optional)
      description: If relevant, attach or paste contents of `%LOCALAPPDATA%\app.map-making.local\logs\mma.log`
      render: text
