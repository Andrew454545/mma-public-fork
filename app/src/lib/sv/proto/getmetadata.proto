// GetMetadata schema for google.internal.maps.mapsjs.v1.MapsJsInternalService.
// Field numbers verified against live responses (binary request/response, content-type
// application/x-protobuf). Regenerate the reader with `npm run proto:gen`.
syntax = "proto2";

message GetMetadataRequest {
  optional RequestContext context = 1;
  optional LocalizationContext locale = 2;
  repeated KeyWrapper key = 3;
  optional MetadataResponseSpecification spec = 4;
}

message RequestContext {
  optional string productId = 1; // "apiv3"
  optional string language = 5;
}

message LocalizationContext {
  optional string language = 1;
  optional string regionCode = 2;
}

message KeyWrapper {
  optional ImageKey key = 1;
}

message MetadataResponseSpecification {
  repeated int32 component = 1; // 1 status, 2 pano, 3 tiles, 4 description, 6 information, 8 floors
}

message GetMetadataResponse {
  optional ResponseStatus status = 1;
  repeated ImageMetadata metadata = 2;
}

message ResponseStatus {
  optional int32 code = 1;
}

message ImageMetadata {
  optional ImageStatus status = 1;
  optional ImageKey pano = 2;
  optional ImageTiles tiles = 3;
  optional ImageDescription description = 4;
  optional ImageAttribution attribution = 5;
  repeated ImageInformation information = 6;
  optional ImageDate date = 7;
}

message ImageStatus {
  optional int32 code = 1; // 1 = OK
}

message ImageKey {
  optional int32 frontend = 1; // PanoType: 2 official, 3 fife, 10 user-uploaded
  optional string id = 2;
}

message ImageSize {
  optional int32 height = 1;
  optional int32 width = 2;
}

message ImageTiles {
  optional ImageSize worldSize = 3;
  optional ImageTileSize tileSize = 4;
  optional string panoId = 10;
}

message ImageTileSize {
  repeated PossibleSize possible = 1;
  optional ImageSize tileSize = 2;
}

message PossibleSize {
  optional ImageSize size = 1;
}

message LocalizedText {
  optional string text = 1;
  optional string language = 2;
}

message ImageDescription {
  repeated LocalizedText description = 3;
}

message ImageTitle {
  optional string name = 1;
}

message AttributionItem {
  optional ImageTitle name = 1;
  optional string url = 2;
}

message ImageAuthor {
  optional LocalizedText name = 1;
  optional string profileUrl = 2;
}

message ImageAttribution {
  repeated AttributionItem item = 1;
  repeated ImageAuthor author = 2;
}

message LatLng {
  optional double lat = 3;
  optional double lng = 4;
}

message Altitude {
  optional float meters = 1;
}

message Pov {
  optional float heading = 1;
  optional float tilt = 2;
  optional float roll = 3;
}

message Level {
  optional uint64 id = 1;
  optional LocalizedText name = 3;
  optional LocalizedText abbreviation = 4;
}

message PanoLocation {
  optional LatLng location = 1;
  optional Altitude altitude = 2;
  optional Pov pov = 3; // heading = driving direction on car coverage
  optional Level level = 4;
  optional string countryCode = 5;
}

message Pano {
  optional ImageKey key = 1;
  optional PanoLocation location = 3;
}

message PanoRelations {
  repeated Pano pano = 1;
}

message PanoLinkProperties {
  optional float heading = 4;
}

message PanoLink {
  optional int32 target = 1; // index into relations
  optional PanoLinkProperties properties = 2;
}

message PanoDate {
  optional int32 year = 1;
  optional int32 month = 2;
  optional int32 day = 3;
}

message PanoTime {
  optional int32 target = 1; // index into relations
  optional PanoDate date = 2;
}

message ImageInformation {
  optional ImageStatus status = 1;
  optional PanoLocation location = 2;
  optional PanoRelations relations = 4;
  repeated PanoLink link = 7;
  repeated PanoTime time = 9;
}

message DateSourceInfo {
  optional string source = 3; // "launch" = car, "scout" = trekker/alleycat
}

message ImageDate {
  optional DateSourceInfo sourceInfo = 6;
  optional PanoDate date = 8;
}
